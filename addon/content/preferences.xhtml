<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window });"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-suggestion-count"
      data-l10n-id="pref-suggestion-count"
    ></html:label>
    <html:input
      type="number"
      id="zotero-prefpane-__addonRef__-suggestion-count"
      min="1"
      max="10"
      style="width: 60px; margin-left: 10px"
    ></html:input>
    <html:span
      style="margin-left: 10px; color: gray; font-size: 0.9em"
      data-l10n-id="pref-suggestion-count-hint"
    ></html:span>
  </hbox>

  <separator class="thin" />

  <description data-l10n-id="pref-description"></description>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
